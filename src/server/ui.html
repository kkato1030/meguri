<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>meguri</title>
<style>
  :root {
    --bg: #10131a; --panel: #181c26; --line: #262c3a;
    --fg: #d7dce6; --dim: #8791a3; --accent: #6ea8fe;
    --warn: #f2c94c; --bad: #ef6a6a; --ok: #58c58f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  main { max-width: 1080px; margin: 0 auto; padding: 20px 16px 48px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  header h1 { font-size: 18px; margin: 0; }
  header .sub { color: var(--dim); font-size: 12px; }

  .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 16px; min-width: 150px;
  }
  .card .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .card .value { font-size: 24px; font-weight: 600; }
  .card.alert { border-color: var(--warn); background: #2b2412; }
  .card.alert .value { color: var(--warn); }

  table { width: 100%; border-collapse: collapse; background: var(--panel);
          border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  th, td { padding: 7px 10px; text-align: left; border-top: 1px solid var(--line); }
  thead th { color: var(--dim); font-size: 11px; text-transform: uppercase;
             letter-spacing: .06em; border-top: none; }
  tr.awaiting { background: #2b2412; }
  tr.awaiting td:first-child { border-left: 3px solid var(--warn); }

  .chip { display: inline-block; padding: 1px 8px; border-radius: 10px;
          font-size: 12px; border: 1px solid var(--line); color: var(--dim); }
  .chip.awaiting_human { color: #1a1508; background: var(--warn); border-color: var(--warn); font-weight: 600; }
  .chip.running, .chip.agent_working, .chip.working { color: var(--ok); border-color: var(--ok); }
  .chip.failed, .chip.blocked { color: var(--bad); border-color: var(--bad); }
  .chip.succeeded, .chip.done { color: var(--ok); }
  .chip.paused, .chip.human_driving, .chip.idle { color: var(--accent); border-color: var(--accent); }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 8px; }
  .toolbar h2 { font-size: 14px; margin: 0; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  label.toggle { color: var(--dim); font-size: 13px; cursor: pointer; user-select: none; }

  pre.tail {
    background: #05070b; border: 1px solid var(--line); border-radius: 8px;
    padding: 12px; overflow-x: auto; min-height: 120px; max-height: 480px;
    overflow-y: auto; font-size: 12.5px; line-height: 1.45; color: #c9d4e3;
    white-space: pre-wrap; word-break: break-all;
  }
  .attach { display: flex; gap: 8px; align-items: center; margin: 8px 0 16px; }
  .attach code { background: var(--panel); border: 1px solid var(--line);
                 border-radius: 6px; padding: 4px 10px; }
  button.copy { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
                border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  button.copy:hover { border-color: var(--accent); }

  ul.events { list-style: none; margin: 0; padding: 0; background: var(--panel);
              border: 1px solid var(--line); border-radius: 8px; max-height: 420px; overflow-y: auto; }
  ul.events li { padding: 5px 10px; border-top: 1px solid var(--line); font-size: 12.5px; }
  ul.events li:first-child { border-top: none; }
  ul.events .ts { color: var(--dim); margin-right: 8px; }
  ul.events .kind { color: var(--accent); margin-right: 8px; }
  ul.events .data { color: var(--dim); word-break: break-all; }

  .meta { color: var(--dim); font-size: 13px; margin: 4px 0 12px; }
  .meta b { color: var(--fg); font-weight: 500; }
  .empty { color: var(--dim); padding: 16px; text-align: center; }
  .error-banner { background: #351b1b; border: 1px solid var(--bad); color: var(--bad);
                  border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; }
</style>
</head>
<body>
<main id="app"><div class="empty">loading…</div></main>
<script>
"use strict";
const POLL_MS = 3000;
const $app = document.getElementById("app");
let timer = null;
let eventsCursor = 0;   // per-run incremental cursor, reset on navigation
let eventsRun = null;

const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function api(path) {
  const res = await fetch(path);
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || (res.status + " " + res.statusText));
  return body;
}

function chip(text) {
  return text ? `<span class="chip ${esc(text)}">${esc(text)}</span>` : "—";
}

function elapsed(run) {
  const from = run.started_at || run.created_at;
  if (!from) return "—";
  const to = run.finished_at ? Date.parse(run.finished_at) : Date.now();
  let s = Math.max(0, Math.floor((to - Date.parse(from)) / 1000));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h${String(m).padStart(2, "0")}m`;
  if (m > 0) return `${m}m${String(s % 60).padStart(2, "0")}s`;
  return `${s}s`;
}

/* ---------- dashboard ---------- */

function showAll() { return localStorage.getItem("meguri.showAll") === "1"; }

async function renderDashboard() {
  const [status, runs] = await Promise.all([
    api("/api/status"),
    api("/api/runs" + (showAll() ? "?all=true" : "")),
  ]);
  document.title = status.awaiting_human > 0 ? `(${status.awaiting_human}) meguri` : "meguri";

  const rows = runs.map(r => `
    <tr class="${r.interaction_state === "awaiting_human" ? "awaiting" : ""}">
      <td class="mono"><a href="#/runs/${esc(r.id)}">${esc(r.id)}</a></td>
      <td>${esc(r.project_id)}</td>
      <td>#${r.issue_number} <span style="color:var(--dim)">${esc(r.issue_title || "")}</span></td>
      <td>${chip(r.status)}</td>
      <td>${chip(r.interaction_state)}</td>
      <td class="mono">${esc(r.step)}</td>
      <td class="mono">${elapsed(r)}</td>
      <td class="mono">${esc(r.mux_pane_id || "—")}</td>
    </tr>`).join("");

  $app.innerHTML = `
    <header><h1>meguri</h1>
      <span class="sub">${status.projects.map(p => esc(p.repo_slug)).join(" · ") || "no projects"}</span>
    </header>
    <div class="cards">
      <div class="card ${status.awaiting_human > 0 ? "alert" : ""}">
        <div class="label">awaiting human</div>
        <div class="value">${status.awaiting_human}</div>
      </div>
      <div class="card">
        <div class="label">active runs</div>
        <div class="value">${status.active_runs}</div>
      </div>
      <div class="card">
        <div class="label">watch</div>
        <div class="value" style="color:var(--${status.watch.alive ? "ok" : "dim"})">
          ${status.watch.alive ? "alive" : "down"}</div>
        <div class="label">${esc(status.watch.last_heartbeat || "no heartbeat")}</div>
      </div>
    </div>
    <div class="toolbar">
      <h2>runs</h2>
      <label class="toggle"><input type="checkbox" id="showAll" ${showAll() ? "checked" : ""}>
        show finished runs</label>
    </div>
    <table>
      <thead><tr><th>run</th><th>project</th><th>issue</th><th>status</th>
        <th>interaction</th><th>step</th><th>elapsed</th><th>pane</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="8" class="empty">no ${showAll() ? "" : "active "}runs</td></tr>`}</tbody>
    </table>`;

  document.getElementById("showAll").addEventListener("change", e => {
    localStorage.setItem("meguri.showAll", e.target.checked ? "1" : "0");
    renderDashboard().catch(showError);
  });
}

/* ---------- run detail ---------- */

async function renderRun(id) {
  const [detail, tail] = await Promise.all([
    api(`/api/runs/${encodeURIComponent(id)}`),
    api(`/api/runs/${encodeURIComponent(id)}/tail?lines=80`),
  ]);
  const run = detail.run;
  const firstPaint = eventsRun !== run.id || !document.getElementById("events");
  if (firstPaint) { eventsRun = run.id; eventsCursor = 0; }
  const ev = await api(`/api/runs/${encodeURIComponent(run.id)}/events?after=${eventsCursor}`);
  document.title = `${run.id} · meguri`;

  if (firstPaint) {
    $app.innerHTML = `
      <header><h1><a href="#/">meguri</a> / <span class="mono">${esc(run.id)}</span></h1></header>
      ${run.error ? `<div class="error-banner">${esc(run.error)}</div>` : ""}
      <div class="meta" id="runMeta"></div>
      <div class="attach" id="attach" hidden>
        <span style="color:var(--dim)">attach:</span><code id="attachCmd"></code>
        <button class="copy" id="copyBtn">copy</button>
      </div>
      <div class="toolbar"><h2>pane tail</h2><span id="agentChip"></span></div>
      <pre class="tail" id="tail"></pre>
      <div class="toolbar"><h2>events</h2></div>
      <ul class="events" id="events"></ul>
      <div class="toolbar"><h2>turns</h2></div>
      <div id="turns"></div>`;
    document.getElementById("copyBtn").addEventListener("click", () => {
      navigator.clipboard.writeText(document.getElementById("attachCmd").textContent);
    });
  }

  document.getElementById("runMeta").innerHTML =
    `${chip(run.status)} ${chip(run.interaction_state)} ` +
    `<b>#${run.issue_number}</b> ${esc(run.issue_title || "")} · ` +
    `project <b>${esc(run.project_id)}</b> · loop <b>${esc(run.loop_kind)}</b> · ` +
    `step <b class="mono">${esc(run.step)}</b> · elapsed <b>${elapsed(run)}</b>` +
    (run.branch ? ` · branch <b class="mono">${esc(run.branch)}</b>` : "");

  const $attach = document.getElementById("attach");
  if (tail.attach_command) {
    $attach.hidden = false;
    document.getElementById("attachCmd").textContent = tail.attach_command;
  }
  document.getElementById("agentChip").innerHTML =
    tail.pane_alive ? chip(tail.agent_state) : `<span class="chip">pane gone</span>`;
  document.getElementById("tail").textContent =
    tail.pane_alive ? (tail.lines.join("\n") || "(pane is empty)") : "(no live pane)";

  const $events = document.getElementById("events");
  if (ev.events.length > 0) {
    if ($events.querySelector(".empty")) $events.innerHTML = "";
    const atBottom = $events.scrollTop + $events.clientHeight >= $events.scrollHeight - 8;
    $events.insertAdjacentHTML("beforeend", ev.events.map(e => `
      <li><span class="ts mono">${esc(e.ts)}</span><span class="kind mono">${esc(e.kind)}</span>
        <span class="data mono">${esc(JSON.stringify(e.data))}</span></li>`).join(""));
    eventsCursor = ev.events[ev.events.length - 1].id;
    if (atBottom || firstPaint) $events.scrollTop = $events.scrollHeight;
  } else if (firstPaint && eventsCursor === 0) {
    $events.innerHTML = `<li class="empty">no events yet</li>`;
  }

  document.getElementById("turns").innerHTML = detail.turns.length === 0
    ? `<div class="empty">no turns yet</div>`
    : `<table><thead><tr><th>#</th><th>purpose</th><th>outcome</th>
         <th>started</th><th>finished</th></tr></thead><tbody>` +
      detail.turns.map(t => `
        <tr><td>${t.turn_no}</td><td class="mono">${esc(t.purpose)}</td>
          <td>${chip(t.outcome)}</td>
          <td class="mono">${esc(t.started_at)}</td>
          <td class="mono">${esc(t.finished_at || "—")}</td></tr>`).join("") +
      `</tbody></table>`;
}

/* ---------- routing / polling ---------- */

function showError(err) {
  $app.innerHTML = `<header><h1><a href="#/">meguri</a></h1></header>
    <div class="error-banner">${esc(err.message || err)}</div>`;
}

function route() {
  clearInterval(timer);
  const m = location.hash.match(/^#\/runs\/(.+)$/);
  const render = m
    ? () => renderRun(decodeURIComponent(m[1]))
    : () => renderDashboard();
  if (!m) { eventsRun = null; $app.innerHTML = `<div class="empty">loading…</div>`; }
  render().catch(showError);
  timer = setInterval(() => render().catch(showError), POLL_MS);
}

window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
