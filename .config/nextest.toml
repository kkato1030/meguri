# cargo-nextest 設定(https://nexte.st/docs/configuration/)

[profile.ci]
# 統合テストは実時間 sleep / tmux IO バウンドで CPU をほぼ使わないため、
# CI ランナー(ubuntu-latest = 4 vCPU)のコア数より広い並列度で回す。
test-threads = 16

[[profile.ci.overrides]]
# cleaner_test は各テストがハードコードされた 60秒のタイムアウト
# (run_to_outcome)でくくられている。テスト自体は1ターンで終わる軽い処理だが、
# 16並列 / 4 vCPU という意図的な過剰並列のもとでは、たまたま他の重いテスト
# (tmux 実プロセスを使うものなど)にスケジューリングを圧迫されただけで
# 60秒を超えることがある(実際に CI で1件だけ発生: 60.338s で timeout)。
# ロジックのバグではなく環境要因のフレークなので、リトライで吸収する。
filter = 'binary(cleaner_test)'
retries = 2

[[profile.ci.overrides]]
# routing_test の escalation_climbs_a_multi_step_chain_without_skipping は
# 3段エスカレーション連鎖 × never-passing check で全 rung を消化する、
# スイート最重量のシナリオ。run_worker がハードコードされた 90秒のタイムアウト
# (drive_worker_scenario)でくくられている。単独では ~16秒で通るが、
# 16並列 / 4 vCPU の過剰並列下で他の tmux 実プロセステストにスケジューリングを
# 圧迫されると 90秒を超えることがある(実際に CI で発生: 90.121s で timeout)。
# cleaner_test と同種の環境要因フレークなので、同じくリトライで吸収する。
filter = 'binary(routing_test)'
retries = 2
