name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy && rustup default stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-nextest

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo nextest
        run: cargo nextest run --profile ci

      # nextest は doctest を実行しないため別途カバーする(現状 0 件、ほぼ即時)
      - name: cargo test --doc
        run: cargo test --doc
