name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # サプライチェーンゲート(issue #77): RustSec advisories / 供給元 crates.io 固定 /
  # ライセンス / wildcard 依存を deny.toml に基づき検査。Renovate PR の必須チェック前提。
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # egress を監査(issue #78)。まず audit で観測し、通信先が安定したら block へ移行する
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy && rustup default stable

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-nextest

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo nextest
        run: cargo nextest run --profile ci

      # nextest は doctest を実行しないため別途カバーする(現状 0 件、ほぼ即時)
      - name: cargo test --doc
        run: cargo test --doc

  # 獲得スキル配布物のドリフト検知(issue #151 / ADR 0012 §4): 未導入ユーザー向けの
  # `apm install kkato1030/meguri/skills/meguri` チャネルが、apm のバージョン更新で黙って
  # 壊れていないかを最小コストで確認する。apm は SHA256 でピンして取得し(ADR 0007 の衛生)、
  # skills/meguri を各ターゲットへ install して SKILL.md が想定パスに展開されることを assert する。
  skills-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # apm.lock.yaml の apm_version と揃える。バージョンを上げるときは SHA256 も
      # リリースの apm-linux-x86_64.tar.gz.sha256 から取り直す。
      APM_VERSION: 0.24.0
      APM_SHA256: 54b58a212d66e0de0b71068e7b3b23169af872183de10bc0fc29e006354d63eb
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # curl 取得は README の配布バイナリ手順と同じく SHA256 検証を必須にする(可変タグに頼らない)
      - name: Install pinned apm
        run: |
          set -euo pipefail
          curl -fsSL -o apm.tar.gz \
            "https://github.com/microsoft/apm/releases/download/v${APM_VERSION}/apm-linux-x86_64.tar.gz"
          echo "${APM_SHA256}  apm.tar.gz" | sha256sum -c -
          tar xzf apm.tar.gz
          echo "${GITHUB_WORKSPACE}/apm-linux-x86_64" >> "${GITHUB_PATH}"

      # 使い捨て cwd から絶対パスで install する。リポジトリルートで走らせると skills/meguri を
      # 本体の apm.yml(meguri 開発用)に足してしまうため、必ずルート外の cwd で回す。
      - name: Verify skills/meguri installs across targets
        run: |
          set -euo pipefail
          apm --version
          work="$(mktemp -d)"
          cd "${work}"
          apm install "${GITHUB_WORKSPACE}/skills/meguri" --target claude,codex,copilot,agent-skills
          # claude は .claude/skills/ 直下(README の配布コマンドが約束するパス)、
          # codex/copilot/agent-skills は共有の .agents/skills/ に入る。
          test -f "${work}/.claude/skills/meguri/SKILL.md"
          test -f "${work}/.agents/skills/meguri/SKILL.md"
          echo "acquisition channel intact: skills/meguri -> .claude/skills/ and .agents/skills/"

  # ワークフロー静的解析(issue #78): 危険な権限 / pull_request_target / 式インジェクション /
  # 未ピン action 等を検出。指摘があれば job が fail し PR をブロックする。
  zizmor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # zizmor 本体は action 内で ghcr digest 固定されており、Renovate の action 更新に追従する。
      # Advanced Security(SARIF)は使わず annotations 出力にして権限を contents: read のままにする
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
